name: Validate ChittyMarket

on:
  pull_request:
    paths:
      - "canonical/**"
      - "plugins/**"
      - ".claude-plugin/**"
      - "marketplace.json"
      - "profiles.json"
      - "scripts/**"
      - ".github/workflows/validate-chittymarket.yml"
  push:
    branches:
      - main
      - "feat/**"

# Cancel in-progress runs when a new commit lands on the same PR/branch.
concurrency:
  group: validate-chittymarket-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: lint + test + manifest idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      # 1. Plugin lint: every plugin has a valid .claude-plugin/plugin.json,
      #    dependencies resolve, hook configs parse, profiles.json validates.
      - name: scripts/lint-plugins.sh
        run: bash scripts/lint-plugins.sh

      # 2. Plugin tests: SKILL.md headers, agent file shapes, MCP configs,
      #    plugins/ tree matches .claude-plugin/marketplace.json.
      - name: scripts/test-plugins.sh
        run: bash scripts/test-plugins.sh

      # 3a. Dispatch idempotency (adversarial review #3): re-running
      #     dispatch.sh sync must not change any projection file. Catches
      #     direct edits to plugins/<plug>/{agents,skills,...}/ that
      #     diverge from canonical/.
      - name: Dispatch idempotency (dispatch.sh sync → no diff)
        run: |
          chmod +x plugins/chittyagent-dispatch/scripts/dispatch.sh plugins/chittyagent-dispatch/scripts/adapters/*.sh
          bash plugins/chittyagent-dispatch/scripts/dispatch.sh sync > /dev/null
          if ! git diff --quiet -- canonical/ plugins/; then
            echo "::error::Direct edits to projection files detected — they diverge from canonical/."
            echo "Run dispatch.sh sync locally and commit, OR edit the canonical source instead."
            echo ""
            echo "--- drift ---"
            git diff --stat -- canonical/ plugins/
            git diff -- canonical/ plugins/ | head -100
            exit 1
          fi
          echo "✓ Projection files are in sync with canonical/"

      # 3b. Manifest idempotency: regenerating from plugins/ must produce
      #     no diff. Catches hand-edits to .claude-plugin/marketplace.json
      #     and plugin.json changes that weren't propagated to the manifest.
      - name: Manifest idempotency (generate-marketplace.sh → no diff)
        run: |
          bash scripts/generate-marketplace.sh
          if ! git diff --quiet -- .claude-plugin/marketplace.json; then
            echo "::error::.claude-plugin/marketplace.json is out of sync with plugins/."
            echo "Run 'bash scripts/generate-marketplace.sh' locally and commit the result."
            echo ""
            echo "--- drift ---"
            git diff -- .claude-plugin/marketplace.json
            exit 1
          fi
          echo "✓ Manifest is idempotent with respect to plugins/"

  # 4. Codex runtime smoke (adversarial review #4): every projected
  #    plugins/<plug>/codex-skills/<name>/SKILL.md must load. Uses real
  #    codex CLI if it ships a load subcommand; otherwise falls back to a
  #    schema-mimic loader and logs the reason.
  codex-smoke:
    name: codex runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Ensure script is executable
        run: chmod +x scripts/runtime-tests/codex-smoke.sh

      - name: Run codex smoke loader
        id: codex_smoke
        continue-on-error: true
        run: |
          set +e
          bash scripts/runtime-tests/codex-smoke.sh
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Report skip reason if runtime unavailable
        if: steps.codex_smoke.outcome == 'failure'
        run: |
          echo "::warning::codex-smoke reported failures or runtime is unavailable."
          echo "If the schema-mimic loader was used (no real codex skill-load CLI), this job"
          echo "still surfaces parse/shape errors and is treated as a hard failure."
          exit ${{ steps.codex_smoke.outputs.exit_code }}

  # 5. OpenClaw runtime smoke (adversarial review #4): every projected
  #    plugins/<plug>/openclaw-agents/<name>.yaml must load. Real openclaw
  #    runtime is not yet publicly distributed — falls back cleanly to
  #    schema-mimic validator that mirrors the openclaw-agent.sh adapter
  #    contract.
  openclaw-smoke:
    name: openclaw runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Ensure script is executable
        run: chmod +x scripts/runtime-tests/openclaw-smoke.sh

      - name: Run openclaw smoke loader
        id: openclaw_smoke
        continue-on-error: true
        run: |
          set +e
          bash scripts/runtime-tests/openclaw-smoke.sh
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Report skip reason if runtime unavailable
        if: steps.openclaw_smoke.outcome == 'failure'
        run: |
          echo "::warning::openclaw-smoke reported failures."
          echo "Real openclaw runtime is not yet on PATH in CI; schema-mimic loader was used."
          echo "Failures indicate adapter or projection drift, not runtime absence."
          exit ${{ steps.openclaw_smoke.outputs.exit_code }}
